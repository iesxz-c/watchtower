<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header { background: #d32f2f; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #eee; }
        .badge.endpoint { background: #e3f2fd; color: #1565c0; }
        .badge.backend { background: #f3e5f5; color: #7b1fa2; }
        .badge.frontend { background: #e8f5e9; color: #2e7d32; }
        .badge.critical { background: #ffebee; color: #c62828; }
        .badge.high { background: #fff3e0; color: #e65100; }
        .pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; font-family: monospace; font-size: 12px; }
        .btn { display: inline-block; padding: 10px 20px; background: #1976d2; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🚨 New Incident</h2>
        </div>
        <div class="content">
            <h3>{{ incident.title }}</h3>
            <p>
                <span class="badge {{ incident.source_type.lower() }}">{{ incident.source_type }}</span>
                <span class="badge {{ incident.severity.lower() }}">{{ incident.severity }}</span>
            </p>
            <p><strong>First Seen:</strong> {{ incident.first_seen }}</p>
            <p><strong>Last Seen:</strong> {{ incident.last_seen }}</p>
            <hr>
            <h4>Details:</h4>
            <div class="pre">
                {{ info | tojson(indent=2) if info else "No additional details provided." }}
            </div>
            <br>
            <p style="text-align: center;">
                <a href="#" class="btn">Investigate in Dashboard</a>
            </p>
        </div>
    </div>
</body>
</html>
